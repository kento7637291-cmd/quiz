<!-- Comments Section (独立コンポーネント - 削除可能) -->
<div class="card bg-dark border-secondary text-white shadow rounded-4">
    <div class="card-header bg-dark border-secondary py-3 d-flex justify-content-between align-items-center">
        <h3 class="card-title h5 mb-0 fw-bold text-info"><i class="bi bi-chat-dots me-2"></i>リアルタイムコメント</h3>
        <span class="badge bg-dark border border-secondary text-muted font-outfit small" id="comment-count">0 件</span>
    </div>

    <!-- コメント投稿フォーム（参加者のみ） -->
    {% if session.get('team_id') and not session.get('is_admin') %}
    <div class="card-body bg-dark-50 border-bottom border-secondary p-3">
        <form id="commentForm" class="d-flex gap-2">
            <input
                type="text"
                id="commentInput"
                class="form-control bg-dark border-secondary text-white form-control-sm"
                placeholder="コメントを入力..."
                maxlength="500"
                required
            />
            <button type="submit" class="btn btn-sm btn-info fw-bold">投稿</button>
        </form>
        <div class="small text-muted mt-2">
            <span id="charCount">0</span>/500 文字
        </div>
    </div>
    {% endif %}

    <!-- コメント一覧 -->
    <div class="card-body p-0" style="max-height: 400px; overflow-y: auto;">
        <div id="commentsList" class="list-group list-group-flush">
            <!-- コメントが動的に挿入される -->
        </div>
    </div>
</div>
